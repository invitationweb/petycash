<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Petty Cash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>💰 Petty Cash</h1>
                <p>Sistem Manajemen Kas Kecil</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <div class="form-group">
                    <label for="role">Login Sebagai</label>
                    <select id="role" required>
                        <option value="">Pilih Role</option>
                        <option value="admin">Admin</option>
                        <option value="karyawan">Karyawan</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>
            <div class="demo-info">
                <p><strong>Demo Login:</strong></p>
                <p>Admin: admin / admin123</p>
                <p>Karyawan: user / user123</p>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            // Demo authentication
            if (role === 'admin' && username === 'admin' && password === 'admin123') {
                localStorage.setItem('currentUser', JSON.stringify({username, role: 'admin', name: 'Administrator'}));
                window.location.href = 'admin.html';
            } else if (role === 'karyawan' && username === 'user' && password === 'user123') {
                localStorage.setItem('currentUser', JSON.stringify({username, role: 'karyawan', name: 'Budi Santoso'}));
                window.location.href = 'karyawan.html';
            } else {
                alert('Username, password, atau role tidak valid!');
            }
        });
    </script>
</body>
</html>
